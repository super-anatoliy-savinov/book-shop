    command: python /code/manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - 8000:8000
    depends_on:
      - db
    environment:
      - DJANGO_SECRET_KEY=django-insecure-e*75@1cc&al9qv35v_u_ws@z@&wxuki6ed0v1)26ru-lgbb#hg
      - DJANGO_DEBUG=True
      - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
  db:
    image: postgres:15
    volumes:
